<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <form onsubmit="acesso(); return false;">
            <div>
                <label>E-mail:</label>
                <input type="email" placeholder="Digite seu e-mail" id="email" required>
            </div>
            <div>
                <label>Senha:</label>
                <input type="password" placeholder="Digite uma senha" id="password" required maxlength="16">
            </div>
            <div>
                <button onclick="acesso()">Entrar</button>
            </div>
            <div>
                <button onclick="IrRegistro()">Cadastrar</button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
